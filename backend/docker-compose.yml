services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thesis_orchestral
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thesis_orchestral"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thesis_orchestral
      PORT: 4001
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-this-secret
      UPLOAD_DIR: uploads
      LOG_LEVEL: debug
    ports:
      - "4001:4001"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  uploads-data:
