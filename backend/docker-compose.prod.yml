services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thesis_orchestral
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thesis_orchestral
      PORT: 4001
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - postgres

volumes:
  postgres-data:
  uploads-data:
